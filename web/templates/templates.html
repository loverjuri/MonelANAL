{% extends "base.html" %}
{% block title %}Шаблоны — MonelANAL{% endblock %}
{% block content %}
<h1>Шаблоны расходов</h1>

<div class="card">
  <h2>Создать шаблон</h2>
  <form method="post">
    <input type="hidden" name="action" value="add">
    <div class="form-group">
      <label for="name">Название</label>
      <input id="name" type="text" name="name" placeholder="Например: Обед" required>
    </div>
    <div class="form-group">
      <label for="amount">Сумма (руб.)</label>
      <input id="amount" type="text" name="amount" placeholder="500" required inputmode="decimal">
    </div>
    <div class="form-group">
      <label for="category">Категория</label>
      <select id="category" name="category">
        {% for c in categories %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn">Создать</button>
  </form>
</div>

{% for t in templates %}
<div class="card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
  <div>
    <p><strong>{{ t.name }}</strong> — {{ t.amount | int }} руб. ({{ t.category }})</p>
  </div>
  <div style="display: flex; gap: 8px;">
    <form action="{{ url_for('web.template_use', template_id=t.id) }}" method="post" style="display:inline;">
      <button type="submit" class="btn">Применить</button>
    </form>
    <a href="{{ url_for('web.template_edit_form', template_id=t.id) }}" class="btn btn-secondary">Редактировать</a>
  </div>
</div>
{% else %}
<p style="color: var(--text-muted);">Нет шаблонов</p>
{% endfor %}
{% endblock %}
