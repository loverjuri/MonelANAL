{% extends "base.html" %}
{% block title %}Редактировать шаблон — MonelANAL{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('web.templates_list') }}" class="btn btn-back" aria-label="Назад">←</a>
  <h1>Редактировать шаблон</h1>
</div>
<form method="post" action="{{ url_for('web.templates_list') }}">
  <input type="hidden" name="action" value="edit">
  <input type="hidden" name="template_id" value="{{ template.id }}">
  <div class="form-group">
    <label for="name">Название</label>
    <input id="name" type="text" name="name" value="{{ template.name }}" required>
  </div>
  <div class="form-group">
    <label for="amount">Сумма (руб.)</label>
    <input id="amount" type="text" name="amount" value="{{ template.amount | int }}" required inputmode="decimal">
  </div>
  <div class="form-group">
    <label for="category">Категория</label>
    <select id="category" name="category">
      {% for c in categories %}
      <option value="{{ c }}" {{ 'selected' if c == template.category else '' }}>{{ c }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn">Сохранить</button>
</form>
{% endblock %}
