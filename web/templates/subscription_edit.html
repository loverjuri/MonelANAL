{% extends "base.html" %}
{% block title %}Редактировать подписку — MonelANAL{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('web.subscriptions') }}" class="btn btn-back" aria-label="Назад">←</a>
  <h1>Редактировать подписку</h1>
</div>
<form method="post" action="{{ url_for('web.subscriptions') }}">
  <input type="hidden" name="action" value="edit">
  <input type="hidden" name="subscription_id" value="{{ subscription.id }}">
  <div class="form-group">
    <label for="name">Название</label>
    <input id="name" type="text" name="name" value="{{ subscription.name }}" required>
  </div>
  <div class="form-group">
    <label for="amount">Сумма (руб.)</label>
    <input id="amount" type="text" name="amount" value="{{ subscription.amount | int }}" required inputmode="decimal">
  </div>
  <div class="form-group">
    <label for="cycle">Период</label>
    <select id="cycle" name="cycle">
      <option value="weekly" {{ 'selected' if subscription.cycle == 'weekly' else '' }}>Еженедельно</option>
      <option value="monthly" {{ 'selected' if subscription.cycle == 'monthly' else '' }}>Ежемесячно</option>
      <option value="yearly" {{ 'selected' if subscription.cycle == 'yearly' else '' }}>Ежегодно</option>
    </select>
  </div>
  <div class="form-group">
    <label for="next_date">След. дата</label>
    <input id="next_date" type="date" name="next_date" value="{{ subscription.next_date or '' }}" required>
  </div>
  <button type="submit" class="btn">Сохранить</button>
</form>
{% endblock %}
