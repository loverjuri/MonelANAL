{% extends "base.html" %}
{% block title %}Расход — MonelANAL{% endblock %}
{% block content %}
<div class="page-header">
  <a href="{{ url_for('web.dashboard') }}" class="btn btn-back" aria-label="Назад">←</a>
  <h1>Добавить расход</h1>
</div>
<form method="post">
  <div class="form-group">
    <label for="amount">Сумма (руб.)</label>
    <input id="amount" type="text" name="amount" placeholder="Например: 500" required inputmode="decimal" pattern="[0-9]+\.?[0-9]*" title="Введите число">
    <div class="quick-amounts" style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;">
      {% for a in [100, 250, 500, 1000, 2000, 5000] %}
      <button type="button" class="btn btn-secondary" style="padding: 8px 12px; min-height: 36px;" data-amount="{{ a }}">{{ a }}</button>
      {% endfor %}
    </div>
  </div>
  <div class="form-group">
    <label for="category">Категория</label>
    <select id="category" name="category">
      {% for cat in categories %}
      <option value="{{ cat }}" {{ 'selected' if cat == (last_category or 'Прочее') else '' }}>{{ cat }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label>Дата</label>
    <input type="date" name="date" value="{{ today or request.values.date or '' }}">
  </div>
  <div class="form-group">
    <label>Комментарий</label>
    <input type="text" name="comment" placeholder="Опционально">
  </div>
  <button type="submit" class="btn">Записать</button>
</form>
<script>
  document.querySelectorAll('.quick-amounts button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.getElementById('amount').value = this.getAttribute('data-amount');
    });
  });
</script>
{% endblock %}
