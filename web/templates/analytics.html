{% extends "base.html" %}
{% block title %}Аналитика — MonelANAL{% endblock %}
{% block content %}
<h1>Аналитика</h1>
<div class="card">
  <p>Доходы: {{ income }} руб.</p>
  <p>Расходы: {{ expense }} руб.</p>
  <p><strong>Баланс: {{ balance }} руб.</strong></p>
</div>
{% if chart_data %}
<div class="card">
  <h2>По категориям</h2>
  <canvas id="chart" height="200"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
      labels: {{ chart_data | map(attribute='category') | list | tojson }},
      datasets: [{
        data: {{ chart_data | map(attribute='amount') | list | tojson }},
        backgroundColor: ['#58a6ff','#3fb950','#f85149','#d29922','#a371f7','#79c0ff','#8b949e']
      }]
    },
    options: { plugins: { legend: { position: 'bottom' } } }
  });
</script>
{% endif %}
{% endblock %}
