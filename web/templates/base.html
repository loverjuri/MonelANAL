<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MonelANAL{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('web.static', filename='css/dark.css') }}">
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  {% block nav %}
  <nav class="nav-bottom">
    <a href="{{ url_for('web.dashboard') }}" class="{% if request.endpoint == 'web.dashboard' %}active{% endif %}"><span class="icon">📊</span>Статус</a>
    <a href="{{ url_for('web.expense') }}" class="{% if request.endpoint == 'web.expense' %}active{% endif %}"><span class="icon">💸</span>Расход</a>
    <a href="{{ url_for('web.budget') }}" class="{% if request.endpoint == 'web.budget' %}active{% endif %}"><span class="icon">💰</span>Бюджет</a>
    <a href="{{ url_for('web.goals') }}" class="{% if request.endpoint == 'web.goals' %}active{% endif %}"><span class="icon">🎯</span>Цели</a>
    <a href="{{ url_for('web.more') }}" class="{% if request.endpoint == 'web.more' %}active{% endif %}"><span class="icon">⋯</span>Ещё</a>
  </nav>
  {% endblock %}
</body>
</html>
