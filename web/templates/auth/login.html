<!DOCTYPE html>
<html lang="ru" id="html-root">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Вход — MonelANAL</title>
  <link rel="stylesheet" href="{{ url_for('web.static', filename='css/dark.css') }}">
  <link rel="stylesheet" href="{{ url_for('web.static', filename='css/light.css') }}">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  {% if recaptcha_site_key %}
  <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_site_key }}" async defer></script>
  {% endif %}
</head>
<body>
  <div class="container" style="max-width: 320px; margin-top: 40px;">
    <h1>Вход</h1>

    {% if telegram_callback and bot_username %}
    <div class="card" style="margin-bottom: 16px; text-align: center;">
      <p style="margin: 0 0 12px 0; color: var(--text-muted); font-size: 14px;">Быстрый вход через Telegram</p>
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="{{ bot_username }}"
        data-size="large"
        data-auth-url="{{ telegram_callback }}"
        data-request-access="write">
      </script>
    </div>
    <p style="text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">— или —</p>
    {% endif %}

    <form method="post" id="login-form">
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" required autocomplete="current-password">
      </div>
      {% if recaptcha_site_key %}
      <input type="hidden" name="g-recaptcha-response" id="recaptcha-token">
      {% endif %}
      <button type="submit" class="btn" style="width: 100%;">Войти по паролю</button>
    </form>
  </div>
  <script>
  (function(){ var t=localStorage.getItem('theme')||'dark'; if(t==='system') t=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'; document.getElementById('html-root').setAttribute('data-theme',t); })();
  </script>
  <script>
  (function() {
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg && tg.initData) {
      document.querySelector('.container').innerHTML = '<h1 style="text-align:center;margin-top:60px;">Вход...</h1>';
      fetch("{{ url_for('web.telegram_login') }}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: tg.initData }),
        credentials: 'include'
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok && d.redirect) {
          window.location.href = d.redirect;
        } else {
          document.querySelector('.container').innerHTML = '<h1 style="text-align:center;margin-top:60px;">Ошибка входа</h1><p style="text-align:center;color:var(--text-muted);">' + (d.error || 'Неизвестная ошибка') + '</p>';
        }
      }).catch(function(e) {
        document.querySelector('.container').innerHTML = '<h1 style="text-align:center;margin-top:60px;">Ошибка сети</h1>';
      });
    }
  })();
  </script>
  {% if recaptcha_site_key %}
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      grecaptcha.ready(function() {
        grecaptcha.execute('{{ recaptcha_site_key }}', {action: 'login'}).then(function(token) {
          document.getElementById('recaptcha-token').value = token;
          form.submit();
        });
      });
    });
  </script>
  {% endif %}
</body>
</html>
